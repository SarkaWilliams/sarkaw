# Sveltia CMS — konfigurace editoru na /admin
# Vyplň před nasazením (viz PROJEKT-BRIEF.md, krok 5):
#   - repo: <owner>/<repo>       → skutečný GitHub repozitář
#   - base_url: OAuth proxy URL  → adresa nasazené sveltia-cms-auth služby

backend:
  name: github
  repo: SarkaWilliams/sarkaw
  branch: main
  base_url: https://sarkaw-cms-auth.sarka-williams.workers.dev

media_folder: public/images
public_folder: /images

i18n:
  structure: multiple_files
  locales: [cs, en]
  default_locale: cs

collections:
  - name: blog
    label: Blog
    folder: src/content/blog
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Název", name: title, widget: string }
      - { label: "Datum", name: date, widget: datetime }
      - { label: "Anotace", name: excerpt, widget: text }
      - { label: "Obsah článku", name: body, widget: markdown }
  - name: pages
    label: Stránky
    i18n: true
    files:
      - name: home
        label: Úvodní stránka
        file: src/content/pages/home.{{locale}}.json
        i18n: true
        fields:
          - { label: "Hero nadpis", name: heroTitle, widget: string, i18n: true }
          - { label: "Hero podnadpis", name: heroSubtitle, widget: text, i18n: true }
          - { label: "Hero motto (citát)", name: heroQuote, widget: string, required: false, i18n: true }
          - { label: "Hero obrázek", name: heroImage, widget: image, i18n: duplicate }
          - { label: "Fotka (O mně)", name: aboutImage, widget: image, i18n: duplicate }
          - { label: "O mně", name: about, widget: markdown, i18n: true }
          - label: "O mně — odborné zázemí (seznam certifikací)"
            name: aboutCredentials
            widget: list
            i18n: true
            field: { label: "Položka", name: item, widget: string }
          - label: "Služby"
            name: services
            widget: list
            i18n: true
            fields:
              - { label: "Název", name: title, widget: string }
              - { label: "Popis", name: description, widget: text }
          - label: "Co nabízím"
            name: offerings
            widget: list
            i18n: true
            fields:
              - { label: "Název", name: title, widget: string }
              - { label: "Citát (nepovinné)", name: quote, widget: string, required: false }
              - { label: "Úvodní text", name: intro, widget: text }
              - { label: "Nadpis nad seznamem bodů (nepovinné)", name: itemsHeading, widget: string, required: false }
              - label: "Body seznamu"
                name: items
                widget: list
                field: { label: "Položka", name: item, widget: string }
              - label: "Ceník"
                name: pricing
                widget: list
                fields:
                  - { label: "Služba", name: label, widget: string }
                  - { label: "Cena", name: price, widget: string }
          - label: "Jak probíhá spolupráce"
            name: process
            widget: object
            i18n: true
            fields:
              - { label: "Nadpis sekce", name: title, widget: string }
              - label: "Kroky"
                name: steps
                widget: list
                fields:
                  - { label: "Název kroku", name: title, widget: string }
                  - { label: "Popis kroku", name: description, widget: text }
              - { label: "CTA text", name: ctaText, widget: text }
              - { label: "Tagline", name: tagline, widget: string }
          - label: "Reference"
            name: testimonials
            widget: list
            i18n: true
            fields:
              - { label: "Citace", name: quote, widget: text }
              - { label: "Jméno", name: name, widget: string }
              - { label: "Pozice / spolupráce (nepovinné)", name: role, widget: string, required: false }
          - label: "Kontakt"
            name: contact
            widget: object
            i18n: duplicate
            fields:
              - { label: "Jméno a titul", name: name, widget: string }
              - { label: "IČO", name: ico, widget: string }
              - { label: "Adresa", name: address, widget: string }
              - { label: "E-mail", name: email, widget: string }
              - { label: "Telefon", name: phone, widget: string }
              - { label: "LinkedIn (odkaz)", name: linkedinUrl, widget: string }
              - { label: "Facebook (odkaz)", name: facebookUrl, widget: string }
              - { label: "Instagram (odkaz)", name: instagramUrl, widget: string }
          - { label: "Text tlačítka (CTA)", name: ctaText, widget: string, i18n: true }
          - { label: "Odkaz tlačítka (Reservio)", name: ctaUrl, widget: string, i18n: duplicate }

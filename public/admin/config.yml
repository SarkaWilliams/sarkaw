# Sveltia CMS — konfigurace editoru na /admin
# Vyplň před nasazením (viz PROJEKT-BRIEF.md, krok 5):
#   - repo: <owner>/<repo>       → skutečný GitHub repozitář
#   - base_url: OAuth proxy URL  → adresa nasazené sveltia-cms-auth služby

backend:
  name: github
  repo: SarkaWilliams/sarkaw
  branch: main
  base_url: https://sarkaw-cms-auth.sarka-williams.workers.dev

media_folder: public/images
public_folder: /images

collections:
  - name: pages
    label: Stránky
    files:
      - name: home
        label: Úvodní stránka
        file: src/content/pages/home.json
        fields:
          - { label: "Hero nadpis", name: heroTitle, widget: string }
          - { label: "Hero podnadpis", name: heroSubtitle, widget: text }
          - { label: "Hero obrázek", name: heroImage, widget: image }
          - { label: "O mně", name: about, widget: markdown }
          - label: "Služby"
            name: services
            widget: list
            fields:
              - { label: "Název", name: title, widget: string }
              - { label: "Popis", name: description, widget: text }
          - label: "Co nabízím"
            name: offerings
            widget: list
            fields:
              - { label: "Název", name: title, widget: string }
              - { label: "Úvodní text", name: intro, widget: text }
              - label: "Body seznamu"
                name: items
                widget: list
                field: { label: "Položka", name: item, widget: string }
          - label: "Kontakt"
            name: contact
            widget: object
            fields:
              - { label: "E-mail", name: email, widget: string }
              - { label: "Telefon", name: phone, widget: string }
              - { label: "LinkedIn (odkaz)", name: linkedin, widget: string }
          - { label: "Text tlačítka (CTA)", name: ctaText, widget: string }
          - { label: "Odkaz tlačítka (Reservio)", name: ctaUrl, widget: string }
